<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check Admin Role - ScentraVN Serenity</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 24px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: #1e293b;
            margin-bottom: 24px;
            text-align: center;
        }

        .result-box {
            background: #f8fafc;
            border-radius: 12px;
            padding: 20px;
            margin: 16px 0;
            font-family: monospace;
            font-size: 0.9rem;
        }

        .result-box pre {
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .btn {
            width: 100%;
            padding: 14px 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 16px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .status {
            padding: 12px;
            border-radius: 8px;
            margin: 12px 0;
            text-align: center;
            font-weight: 600;
        }

        .status.success {
            background: rgba(16, 185, 129, 0.1);
            color: #065f46;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .status.error {
            background: rgba(239, 68, 68, 0.1);
            color: #991b1b;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .status.warning {
            background: rgba(245, 158, 11, 0.1);
            color: #92400e;
            border: 1px solid rgba(245, 158, 11, 0.3);
        }

        .info {
            background: #eff6ff;
            border-left: 4px solid #3b82f6;
            padding: 16px;
            margin: 16px 0;
            border-radius: 8px;
        }

        .fix-btn {
            background: #10b981;
            margin-top: 12px;
        }

        .fix-btn:hover {
            box-shadow: 0 8px 20px rgba(16, 185, 129, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Check Admin Role</h1>

        <div class="info">
            <strong>Testing admin account:</strong><br>
            Email: <code>admin@scentravn.com</code>
        </div>

        <button class="btn" onclick="checkAdminRole()">Check Admin Role</button>

        <div id="result"></div>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>

    <!-- Config -->
    <script src="js/config.keys.js"></script>
    <script src="js/config.js"></script>
    <script src="js/firebase-config.js"></script>

    <script>
        async function checkAdminRole() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<div class="status">Checking...</div>';

            try {
                // Search for admin user in Firestore
                const adminEmail = 'admin@scentravn.com';
                const usersSnapshot = await db.collection('users')
                    .where('email', '==', adminEmail)
                    .get();

                if (usersSnapshot.empty) {
                    resultDiv.innerHTML = `
                        <div class="status error">
                            ❌ User dengan email ${adminEmail} tidak ditemukan di Firestore!
                        </div>
                        <div class="info">
                            <strong>Solusi:</strong><br>
                            Buka <a href="create-admin.html">create-admin.html</a> untuk membuat akun admin.
                        </div>
                    `;
                    return;
                }

                // Get user data
                const userDoc = usersSnapshot.docs[0];
                const userData = userDoc.data();
                const userId = userDoc.id;

                // Display user data
                let html = '<div class="result-box"><strong>User Data:</strong><pre>';
                html += JSON.stringify(userData, null, 2);
                html += '</pre></div>';

                // Check role
                if (userData.role === 'admin') {
                    html += `
                        <div class="status success">
                            ✅ Role sudah benar: <strong>${userData.role}</strong>
                        </div>
                        <div class="info">
                            <strong>User ID:</strong> ${userId}<br>
                            <strong>Email:</strong> ${userData.email}<br>
                            <strong>Role:</strong> ${userData.role}
                        </div>
                        <div class="info" style="margin-top: 16px;">
                            <strong>⚠️ Jika login masih tidak redirect ke admin:</strong><br><br>
                            1. Clear browser cache: <code>Ctrl + Shift + Delete</code><br>
                            2. Hard reload: <code>Ctrl + F5</code><br>
                            3. Restart server (tutup start.bat, jalankan lagi)<br>
                            4. Test di browser mode Incognito/Private
                        </div>
                    `;
                } else {
                    html += `
                        <div class="status error">
                            ❌ Role SALAH! Ditemukan: <strong>${userData.role || 'tidak ada'}</strong><br>
                            Seharusnya: <strong>admin</strong>
                        </div>
                        <button class="btn fix-btn" onclick="fixAdminRole('${userId}')">
                            🔧 Fix Role Sekarang
                        </button>
                    `;
                }

                resultDiv.innerHTML = html;

            } catch (error) {
                console.error('Error:', error);
                resultDiv.innerHTML = `
                    <div class="status error">
                        ❌ Error: ${error.message}
                    </div>
                    <div class="result-box"><pre>${error.stack}</pre></div>
                `;
            }
        }

        async function fixAdminRole(userId) {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<div class="status">Updating role...</div>';

            try {
                // Update role to admin
                await db.collection('users').doc(userId).update({
                    role: 'admin',
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                resultDiv.innerHTML = `
                    <div class="status success">
                        ✅ Role berhasil diupdate menjadi <strong>admin</strong>!
                    </div>
                    <div class="info">
                        Sekarang coba login lagi di <a href="auth.html">auth.html</a>
                    </div>
                `;

                // Re-check
                setTimeout(() => {
                    checkAdminRole();
                }, 2000);

            } catch (error) {
                console.error('Error:', error);
                resultDiv.innerHTML = `
                    <div class="status error">
                        ❌ Gagal update role: ${error.message}
                    </div>
                `;
            }
        }

        // Auto-check on load
        window.addEventListener('DOMContentLoaded', () => {
            checkAdminRole();
        });
    </script>
</body>
</html>
