<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup Admin User - SYNAWATCH</title>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #7c3aed 0%, #a855f7 50%, #ec4899 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: #7c3aed;
            font-size: 1.75rem;
            font-weight: 800;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .subtitle {
            color: #64748b;
            font-size: 0.9rem;
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        input, select {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 0.95rem;
            font-family: inherit;
            transition: all 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #7c3aed;
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
        }

        .btn {
            width: 100%;
            padding: 14px 20px;
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 24px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(124, 58, 237, 0.4);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .alert {
            padding: 14px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            display: none;
        }

        .alert.success {
            background: rgba(16, 185, 129, 0.1);
            color: #065f46;
            border: 1px solid rgba(16, 185, 129, 0.3);
            display: block;
        }

        .alert.error {
            background: rgba(239, 68, 68, 0.1);
            color: #991b1b;
            border: 1px solid rgba(239, 68, 68, 0.3);
            display: block;
        }

        .alert.info {
            background: rgba(59, 130, 246, 0.1);
            color: #1e40af;
            border: 1px solid rgba(59, 130, 246, 0.3);
            display: block;
        }

        .method-selector {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }

        .method-btn {
            flex: 1;
            padding: 12px;
            background: white;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            font-weight: 600;
            color: #64748b;
        }

        .method-btn.active {
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            color: white;
            border-color: #7c3aed;
        }

        .method-content {
            display: none;
        }

        .method-content.active {
            display: block;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #e2e8f0;
            border-top-color: #7c3aed;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 12px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .user-list {
            max-height: 300px;
            overflow-y: auto;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            margin-top: 12px;
        }

        .user-item {
            padding: 12px 16px;
            border-bottom: 1px solid #e2e8f0;
            cursor: pointer;
            transition: background 0.2s;
        }

        .user-item:hover {
            background: #f8fafc;
        }

        .user-item:last-child {
            border-bottom: none;
        }

        .user-item.selected {
            background: rgba(124, 58, 237, 0.1);
        }

        .user-email {
            font-weight: 600;
            color: #1e293b;
        }

        .user-id {
            font-size: 0.8rem;
            color: #64748b;
            margin-top: 2px;
        }

        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 700;
            margin-left: 8px;
        }

        .badge-admin {
            background: rgba(124, 58, 237, 0.1);
            color: #7c3aed;
        }

        .badge-user {
            background: rgba(100, 116, 139, 0.1);
            color: #64748b;
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #7c3aed;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>
            <i class="fas fa-user-shield"></i>
            Setup Admin User
        </h1>
        <p class="subtitle">Pilih metode untuk menambahkan admin ke sistem SYNAWATCH</p>

        <!-- Alert -->
        <div id="alert" class="alert"></div>

        <!-- Method Selector -->
        <div class="method-selector">
            <button class="method-btn active" onclick="switchMethod('create')">
                <i class="fas fa-user-plus"></i><br>Buat Baru
            </button>
            <button class="method-btn" onclick="switchMethod('existing')">
                <i class="fas fa-users"></i><br>Dari User
            </button>
        </div>

        <!-- Loading -->
        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>Processing...</p>
        </div>

        <!-- Method 1: Create New Admin -->
        <div id="create-method" class="method-content active">
            <form id="createAdminForm" onsubmit="createNewAdmin(event)">
                <div class="form-group">
                    <label>Email Admin</label>
                    <input type="email" id="adminEmail" placeholder="admin@example.com" required>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="adminPassword" placeholder="Minimal 6 karakter" required minlength="6">
                </div>

                <div class="form-group">
                    <label>Nama Admin</label>
                    <input type="text" id="adminName" placeholder="Nama Lengkap" required>
                </div>

                <button type="submit" class="btn">
                    <i class="fas fa-user-plus"></i> Buat Admin Baru
                </button>
            </form>
        </div>

        <!-- Method 2: Upgrade Existing User -->
        <div id="existing-method" class="method-content">
            <div class="form-group">
                <label>Cari User</label>
                <input type="text" id="searchUser" placeholder="Cari email..." onkeyup="searchUsers()">
            </div>

            <div id="userList" class="user-list">
                <div style="padding: 40px 20px; text-align: center; color: #64748b;">
                    <i class="fas fa-search" style="font-size: 2rem; margin-bottom: 8px;"></i>
                    <p>Ketik untuk mencari user...</p>
                </div>
            </div>

            <button type="button" class="btn" id="upgradeBtn" onclick="upgradeToAdmin()" disabled>
                <i class="fas fa-arrow-up"></i> Upgrade ke Admin
            </button>
        </div>

        <a href="admin.html" class="back-link">
            <i class="fas fa-arrow-left"></i> Kembali ke Admin Dashboard
        </a>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>

    <!-- Config - URUTAN PENTING! -->
    <script src="js/config.keys.js"></script>
    <script src="js/config.js"></script>
    <script src="js/firebase-config.js"></script>

    <script>
        let allUsers = [];
        let selectedUserId = null;

        // Switch between methods
        function switchMethod(method) {
            // Update buttons
            document.querySelectorAll('.method-btn').forEach(btn => btn.classList.remove('active'));
            event.target.closest('.method-btn').classList.add('active');

            // Update content
            document.querySelectorAll('.method-content').forEach(content => content.classList.remove('active'));
            document.getElementById(`${method}-method`).classList.add('active');

            // Clear alert
            hideAlert();

            // Load users if switching to existing
            if (method === 'existing' && allUsers.length === 0) {
                loadUsers();
            }
        }

        // Create new admin
        async function createNewAdmin(event) {
            event.preventDefault();

            const email = document.getElementById('adminEmail').value;
            const password = document.getElementById('adminPassword').value;
            const name = document.getElementById('adminName').value;

            showLoading();
            hideAlert();

            try {
                // Create user account
                const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                const userId = userCredential.user.uid;

                // Update profile
                await userCredential.user.updateProfile({
                    displayName: name
                });

                // Create user document with admin role
                await db.collection('users').doc(userId).set({
                    email: email,
                    name: name,
                    role: 'admin',
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    onboardingCompleted: true
                });

                hideLoading();
                showAlert('success', `✅ Admin berhasil dibuat! Email: ${email}`);

                // Reset form
                document.getElementById('createAdminForm').reset();

                // Sign out the newly created user
                await auth.signOut();

                setTimeout(() => {
                    if (confirm('Admin berhasil dibuat! Apakah Anda ingin login sebagai admin sekarang?')) {
                        window.location.href = 'auth.html';
                    }
                }, 1000);

            } catch (error) {
                hideLoading();
                console.error('Error creating admin:', error);

                let errorMessage = 'Gagal membuat admin.';
                if (error.code === 'auth/email-already-in-use') {
                    errorMessage = 'Email sudah terdaftar. Gunakan metode "Dari User" untuk upgrade.';
                } else if (error.code === 'auth/weak-password') {
                    errorMessage = 'Password terlalu lemah. Gunakan minimal 6 karakter.';
                } else if (error.code === 'auth/invalid-email') {
                    errorMessage = 'Format email tidak valid.';
                } else {
                    errorMessage += ' ' + error.message;
                }

                showAlert('error', errorMessage);
            }
        }

        // Load all users
        async function loadUsers() {
            try {
                const snapshot = await db.collection('users').get();
                allUsers = snapshot.docs.map(doc => ({
                    id: doc.id,
                    ...doc.data()
                }));

                console.log('Users loaded:', allUsers.length);
                displayUsers(allUsers);
            } catch (error) {
                console.error('Error loading users:', error);
                showAlert('error', 'Gagal memuat daftar user. Pastikan Anda login sebagai admin.');
            }
        }

        // Display users
        function displayUsers(users) {
            const userList = document.getElementById('userList');

            if (users.length === 0) {
                userList.innerHTML = `
                    <div style="padding: 40px 20px; text-align: center; color: #64748b;">
                        <i class="fas fa-user-slash" style="font-size: 2rem; margin-bottom: 8px;"></i>
                        <p>Tidak ada user ditemukan</p>
                    </div>
                `;
                return;
            }

            userList.innerHTML = users.map(user => `
                <div class="user-item" onclick="selectUser('${user.id}')">
                    <div class="user-email">
                        ${user.email || user.name || 'Unknown User'}
                        <span class="badge badge-${user.role === 'admin' ? 'admin' : 'user'}">
                            ${(user.role || 'user').toUpperCase()}
                        </span>
                    </div>
                    <div class="user-id">${user.id}</div>
                </div>
            `).join('');
        }

        // Search users
        function searchUsers() {
            const query = document.getElementById('searchUser').value.toLowerCase();

            if (query.length === 0) {
                displayUsers(allUsers);
                return;
            }

            const filtered = allUsers.filter(user =>
                (user.email || '').toLowerCase().includes(query) ||
                (user.name || '').toLowerCase().includes(query) ||
                user.id.toLowerCase().includes(query)
            );

            displayUsers(filtered);
        }

        // Select user
        function selectUser(userId) {
            selectedUserId = userId;

            // Update UI
            document.querySelectorAll('.user-item').forEach(item => {
                item.classList.remove('selected');
            });
            event.target.closest('.user-item').classList.add('selected');

            // Enable button
            document.getElementById('upgradeBtn').disabled = false;

            hideAlert();
        }

        // Upgrade user to admin
        async function upgradeToAdmin() {
            if (!selectedUserId) {
                showAlert('error', 'Pilih user terlebih dahulu');
                return;
            }

            const user = allUsers.find(u => u.id === selectedUserId);

            if (user.role === 'admin') {
                showAlert('info', 'User ini sudah menjadi admin');
                return;
            }

            if (!confirm(`Upgrade user "${user.email}" menjadi admin?`)) {
                return;
            }

            showLoading();
            hideAlert();

            try {
                await db.collection('users').doc(selectedUserId).update({
                    role: 'admin',
                    roleUpdatedAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                hideLoading();
                showAlert('success', `✅ User "${user.email}" berhasil di-upgrade menjadi admin!`);

                // Reload users
                await loadUsers();

                // Reset selection
                selectedUserId = null;
                document.getElementById('upgradeBtn').disabled = true;

            } catch (error) {
                hideLoading();
                console.error('Error upgrading user:', error);
                showAlert('error', 'Gagal upgrade user: ' + error.message);
            }
        }

        // UI Helpers
        function showLoading() {
            document.getElementById('loading').classList.add('active');
            document.querySelectorAll('.btn').forEach(btn => btn.disabled = true);
        }

        function hideLoading() {
            document.getElementById('loading').classList.remove('active');
            document.querySelectorAll('.btn').forEach(btn => btn.disabled = false);
        }

        function showAlert(type, message) {
            const alert = document.getElementById('alert');
            alert.className = `alert ${type}`;
            alert.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : type === 'error' ? 'exclamation-circle' : 'info-circle'}"></i> ${message}`;
        }

        function hideAlert() {
            document.getElementById('alert').className = 'alert';
            document.getElementById('alert').innerHTML = '';
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            // Check if user is logged in
            auth.onAuthStateChanged((user) => {
                if (!user) {
                    showAlert('info', 'Login terlebih dahulu untuk menggunakan fitur ini.');
                }
            });
        });
    </script>
</body>
</html>
