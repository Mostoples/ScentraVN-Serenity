<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Admin Account - ScentraVN Serenity</title>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/icon-animations.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 24px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo i {
            font-size: 4rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        h1 {
            color: #1e293b;
            font-size: 1.75rem;
            font-weight: 800;
            margin-bottom: 8px;
            text-align: center;
        }

        .subtitle {
            color: #64748b;
            text-align: center;
            margin-bottom: 32px;
            font-size: 0.95rem;
        }

        .status {
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            text-align: center;
        }

        .status.loading {
            background: rgba(59, 130, 246, 0.1);
            color: #1e40af;
            border: 1px solid rgba(59, 130, 246, 0.3);
        }

        .status.success {
            background: rgba(16, 185, 129, 0.1);
            color: #065f46;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .status.error {
            background: rgba(239, 68, 68, 0.1);
            color: #991b1b;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #e2e8f0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .info-box {
            background: #f8fafc;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 0.9rem;
        }

        .info-item:last-child {
            margin-bottom: 0;
        }

        .info-label {
            color: #64748b;
            font-weight: 600;
        }

        .info-value {
            color: #1e293b;
            font-weight: 700;
            font-family: monospace;
        }

        .btn {
            width: 100%;
            padding: 14px 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 16px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .links {
            text-align: center;
            margin-top: 24px;
        }

        .links a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            margin: 0 8px;
        }

        .links a:hover {
            text-decoration: underline;
        }

        .icon-check {
            font-size: 3rem;
            color: #10b981;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <i class="fas fa-user-shield"></i>
        </div>

        <h1>Create Admin Account</h1>
        <p class="subtitle">Auto-create admin untuk ScentraVN Serenity</p>

        <div id="statusBox"></div>

        <div id="adminInfo" class="info-box" style="display: none;">
            <div class="info-item">
                <span class="info-label">Email:</span>
                <span class="info-value" id="adminEmail">-</span>
            </div>
            <div class="info-item">
                <span class="info-label">Password:</span>
                <span class="info-value" id="adminPassword">-</span>
            </div>
            <div class="info-item">
                <span class="info-label">Name:</span>
                <span class="info-value" id="adminName">-</span>
            </div>
            <div class="info-item">
                <span class="info-label">Role:</span>
                <span class="info-value">admin</span>
            </div>
        </div>

        <div id="successActions" style="display: none; text-align: center;">
            <i class="fas fa-check-circle icon-check"></i>
            <p style="color: #065f46; font-weight: 600; margin-bottom: 16px;">
                Admin account berhasil dibuat!
            </p>
            <p style="color: #64748b; font-size: 0.9rem; margin-bottom: 20px;">
                Silakan login dengan kredensial di atas
            </p>
        </div>

        <button id="createBtn" class="btn" onclick="createAdmin()">
            <i class="fas fa-magic"></i> Create Admin Now
        </button>

        <div class="links">
            <a href="auth.html"><i class="fas fa-sign-in-alt"></i> Login</a>
            <a href="app.html#admin"><i class="fas fa-shield-halved"></i> Admin Dashboard</a>
        </div>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>

    <!-- Config - URUTAN PENTING! -->
    <script src="js/config.keys.js"></script>
    <script src="js/config.js"></script>
    <script src="js/firebase-config.js"></script>

    <script>
        // Default admin credentials
        const ADMIN_CREDENTIALS = {
            email: 'admin@scentravn.com',
            password: 'ScentraAdmin2026!',
            name: 'Super Admin'
        };

        function showStatus(type, message) {
            const statusBox = document.getElementById('statusBox');
            statusBox.className = `status ${type}`;
            statusBox.innerHTML = message;
            statusBox.style.display = 'block';
        }

        async function createAdmin() {
            const btn = document.getElementById('createBtn');
            const infoBox = document.getElementById('adminInfo');
            const successActions = document.getElementById('successActions');

            btn.disabled = true;
            infoBox.style.display = 'none';
            successActions.style.display = 'none';

            // Show loading
            showStatus('loading', `
                <div class="spinner"></div>
                <p>Creating admin account...</p>
                <p style="font-size: 0.8rem; margin-top: 8px; opacity: 0.7;">
                    Email: ${ADMIN_CREDENTIALS.email}
                </p>
            `);

            try {
                // Create user with Firebase Auth
                console.log('Creating user account...');
                const userCredential = await auth.createUserWithEmailAndPassword(
                    ADMIN_CREDENTIALS.email,
                    ADMIN_CREDENTIALS.password
                );

                const userId = userCredential.user.uid;
                console.log('User created with ID:', userId);

                // Update display name
                await userCredential.user.updateProfile({
                    displayName: ADMIN_CREDENTIALS.name
                });

                // Create user document in Firestore with admin role
                console.log('Creating Firestore document...');
                await db.collection('users').doc(userId).set({
                    email: ADMIN_CREDENTIALS.email,
                    name: ADMIN_CREDENTIALS.name,
                    role: 'admin',
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    onboardingCompleted: true,
                    createdBy: 'auto-setup',
                    createdVia: 'create-admin.html'
                });

                console.log('Admin created successfully!');

                // Show success
                showStatus('success', '✅ Admin account created successfully!');

                // Show credentials
                document.getElementById('adminEmail').textContent = ADMIN_CREDENTIALS.email;
                document.getElementById('adminPassword').textContent = ADMIN_CREDENTIALS.password;
                document.getElementById('adminName').textContent = ADMIN_CREDENTIALS.name;
                infoBox.style.display = 'block';
                successActions.style.display = 'block';

                // Hide button
                btn.style.display = 'none';

                // Sign out the newly created user
                await auth.signOut();

                // Auto redirect after 5 seconds
                setTimeout(() => {
                    if (confirm('Admin created! Redirect to login page?')) {
                        window.location.href = 'auth.html';
                    }
                }, 3000);

            } catch (error) {
                console.error('Error creating admin:', error);
                btn.disabled = false;

                let errorMessage = 'Failed to create admin account.';

                if (error.code === 'auth/email-already-in-use') {
                    errorMessage = `
                        ⚠️ Email sudah terdaftar!<br><br>
                        <strong>Admin sudah ada dengan email:</strong><br>
                        <code style="background: white; padding: 4px 8px; border-radius: 4px;">${ADMIN_CREDENTIALS.email}</code><br><br>
                        Silakan login atau gunakan email lain.
                    `;
                } else if (error.code === 'auth/weak-password') {
                    errorMessage = '❌ Password terlalu lemah. Gunakan minimal 6 karakter.';
                } else if (error.code === 'auth/invalid-email') {
                    errorMessage = '❌ Format email tidak valid.';
                } else if (error.code === 'auth/network-request-failed') {
                    errorMessage = '❌ Koneksi internet bermasalah. Check koneksi Anda.';
                } else {
                    errorMessage += '<br><br><small>' + error.message + '</small>';
                }

                showStatus('error', errorMessage);

                // Show current credentials anyway
                document.getElementById('adminEmail').textContent = ADMIN_CREDENTIALS.email;
                document.getElementById('adminPassword').textContent = ADMIN_CREDENTIALS.password;
                document.getElementById('adminName').textContent = ADMIN_CREDENTIALS.name;
                infoBox.style.display = 'block';
            }
        }

        // Auto check if admin already exists
        window.addEventListener('DOMContentLoaded', async () => {
            showStatus('loading', `
                <div class="spinner"></div>
                <p>Checking existing admin accounts...</p>
            `);

            try {
                // Check if admin with this email exists
                const users = await db.collection('users')
                    .where('email', '==', ADMIN_CREDENTIALS.email)
                    .get();

                if (!users.empty) {
                    const adminData = users.docs[0].data();

                    showStatus('success', `
                        ✅ Admin sudah ada!<br><br>
                        <strong>Email:</strong> ${adminData.email}<br>
                        <strong>Role:</strong> ${adminData.role || 'user'}
                    `);

                    document.getElementById('adminEmail').textContent = ADMIN_CREDENTIALS.email;
                    document.getElementById('adminPassword').textContent = ADMIN_CREDENTIALS.password;
                    document.getElementById('adminName').textContent = adminData.name || ADMIN_CREDENTIALS.name;
                    document.getElementById('adminInfo').style.display = 'block';

                    document.getElementById('createBtn').textContent = '✓ Admin Already Exists';
                    document.getElementById('createBtn').disabled = true;
                } else {
                    showStatus('loading', `
                        <i class="fas fa-info-circle"></i> Ready to create admin account.<br><br>
                        Click button below to create.
                    `);
                }
            } catch (error) {
                console.error('Error checking admin:', error);
                showStatus('error', '⚠️ Failed to check existing admin. Firebase may not be configured properly.');
            }
        });
    </script>
</body>
</html>
